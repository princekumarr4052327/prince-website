<!DOCTYPE html>
<html>
<head>
<title>Prince Kumar | Resume</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

/* Animation */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ❤️ Heart Image */
.heart-img {
    width: 200px;
    height: 180px;
    margin: auto;
}

.heart-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    clip-path: path("M100 180 Q20 120 50 60 Q100 20 150 60 Q180 120 100 180 Z");
    box-shadow: 0 0 20px rgba(255, 0, 100, 0.6);
}

/* Sections */
h2 {
    border-bottom: 2px solid white;
}

.section {
    margin: 20px 0;
}

/* Skill Bars */
.bar {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
}

.fill {
    background: linear-gradient(90deg, #36d1dc, #5b86e5);
    padding: 8px;
    border-radius: 20px;
    width: 0;
    animation: fillAnim 2s forwards;
}

@keyframes fillAnim {
    to { width: var(--width); }
}

/* Button */
button {
    padding: 10px 15px;
    border: none;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* Dark Mode */
.dark {
    background: #0f172a;
}

.dark-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
}
</style>
</head>

<body>

<button class="dark-toggle" onclick="toggleDark()">🌙</button>

<div class="container">

<header>
    <h1 class="fade-in">Prince Kumar</h1>
    <p class="fade-in">Student | Aspiring Programmer | Chess Player</p>

    <div class="heart-img">
        <img src="myphoto.jpg">
    </div>
</header>

<div class="section">
<h2>Objective</h2>
<p>A passionate student who loves learning and coding.</p>
</div>

<div class="section">
<h2>Skills</h2>

<div class="bar">
<div class="fill" style="--width:70%">Coding</div>
</div>

<div class="bar">
<div class="fill" style="--width:80%">Chess</div>
</div>

</div>

<div class="section">
<h2>Contact</h2>
<button onclick="sendMail()">📧 Email Me</button>
</div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

function sendMail() {
    window.location.href = "mailto:your@email.com";
}
</script>

</body>
</html>
