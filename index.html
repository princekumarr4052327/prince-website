<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
    transition: 0.5s;
}

/* Animation */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.dark {
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    transition: 0.5s;
}

.dark .container {
    background: #1e293b;
}

/* 🔥 Header upgraded */
header {
    text-align: center;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    padding: 20px;
    border-radius: 15px;
}

img {
    width: 120px;
    border-radius: 50%;
    margin-top: 10px;
}

/* 🔥 Headings colorful */
h2 {
    border-bottom: 2px solid #ff7e5f;
}

/* Sections */
.section {
    margin: 20px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 1s forwards;
}

/* Skill Bars */
.skill {
    margin: 10px 0;
}

.bar {
    background: #ddd;
    border-radius: 20px;
}

.fill {
    background: linear-gradient(90deg, #36d1dc, #5b86e5);
    padding: 8px;
    border-radius: 20px;
    width: 0;
    animation: fillAnim 2s forwards;
}

@keyframes fillAnim {
    to { width: var(--width); }
}

/* 🔥 Button colorful */
button {
    padding: 10px 15px;
    border: none;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

/* ✨ Hover effect */
button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.dark-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
}
</style>
