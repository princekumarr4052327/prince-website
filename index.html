<!DOCTYPE html>
<html>
<head>
<title>Prince Kumar😎 | Resume</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    overflow-x: hidden;
}

/* PARTICLES */
.particle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: move 5s linear infinite;
}

@keyframes move {
    from { transform: translateX(-100px); }
    to { transform: translateX(110vw); }
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

/* Fade */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ❤️ HEART + BEAT */
.heart-img {
    width: 230px;
    height: 210px;
    margin: auto;
    animation: heartbeat 1.5s infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.08); }
    50% { transform: scale(1); }
    75% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.heart-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    clip-path: path("M115 210 C40 140, 10 80, 60 40 C95 10, 135 10, 170 40 C220 80, 190 140, 115 210 Z");
    box-shadow: 0 0 20px rgba(255, 0, 100, 0.6);
}

/* Sections */
.section {
    margin: 20px 0;
}

/* Typing text hidden initially */
.type {
    border-right: 2px solid white;
    white-space: normal;
    overflow: hidden;
}

/* Headings */
h2 {
    border-bottom: 2px solid white;
}

/* Skill Bars */
.bar {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    margin: 10px 0;
    transition: 0.3s;
}

.bar:hover {
    transform: scale(1.03);
}

.fill {
    background: linear-gradient(90deg, #36d1dc, #5b86e5);
    padding: 8px;
    border-radius: 20px;
    width: 0;
    animation: fillAnim 2s forwards;
}

@keyframes fillAnim {
    to { width: var(--width); }
}

/* Button */
button {
    padding: 10px 15px;
    border: none;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* Dark Mode */
.dark {
    background: #0f172a;
}

.dark-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
}
</style>
</head>

<body>

<button class="dark-toggle" onclick="toggleDark()">🌙</button>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.top=Math.random()*100+"vh";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<div class="container">

<header>
    <h1 class="fade-in">Prince Kumar</h1>
    <p class="fade-in">Student | Aspiring Programmer | Chess Player</p>

    <div class="heart-img">
        <img src="myphoto.jpg">
    </div>
</header>

<div class="section">
<h2>Objective</h2>
<p id="type1" class="type"></p>
</div>

<div class="section">
<h2>Education</h2>
<p id="type2" class="type"></p>
<p id="type3" class="type"></p>
</div>

<div class="section">
<h2>Technical Skills</h2>

<div class="bar">
<div class="fill" style="--width:60%">Python (Learning)</div>
</div>

<div class="bar">
<div class="fill" style="--width:75%">Video Editing (PC)</div>
</div>

<div class="bar">
<div class="fill" style="--width:65%">Computer Knowledge</div>
</div>

</div>

<div class="section">
<h2>Other Skills</h2>
<ul>
<li>Advanced Chess Player (ELO 1250+)</li>
<li>Mental Maths Skills</li>
<li>Strategic Thinking</li>
</ul>
</div>

<div class="section">
<h2>Contact</h2>
<button onclick="sendMail()">📧 Email Me</button>
</div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

function sendMail() {
    window.location.href = "mailto:your@email.com";
}

/* TYPING EFFECT */
function type(id,text,speed){
    let i=0;
    function typing(){
        if(i<text.length){
            document.getElementById(id).innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

type("type1","A passionate student❤️ who is eager😎 to learn new skills👍🏻, explore science🧬 and mathematics🧮, and build a strong foundation in programming👨🏻‍💻 and problem-solving🤔.",20);

setTimeout(()=>type("type2","Class 10 (Currently Studying)",30),2000);
setTimeout(()=>type("type3","DBRA CM SHRI School, D-Block, Nand Nagri, Delhi",30),3500);

</script>

</body>
</html>
